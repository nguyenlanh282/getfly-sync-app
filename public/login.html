<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Đăng nhập — Getfly Sync</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 50%,#6d28d9 100%);
      padding:16px;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:radial-gradient(ellipse at 20% 50%,rgba(255,255,255,.07) 0%,transparent 60%),
                 radial-gradient(ellipse at 80% 20%,rgba(255,255,255,.05) 0%,transparent 50%);
      pointer-events:none;
    }
    .box{
      width:100%;max-width:420px;
      background:#fff;border-radius:20px;
      box-shadow:0 25px 60px rgba(0,0,0,.25),0 8px 25px rgba(79,70,229,.3);
      overflow:hidden;
    }
    .bh{
      padding:32px 32px 28px;text-align:center;
      background:linear-gradient(135deg,#4f46e5,#7c3aed);
    }
    .logo{
      width:60px;height:60px;border-radius:16px;
      background:rgba(255,255,255,.15);
      display:flex;align-items:center;justify-content:center;
      font-size:28px;margin:0 auto 14px;
      box-shadow:0 4px 15px rgba(0,0,0,.2);
    }
    .bh h1{color:#fff;font-size:22px;font-weight:800;margin-bottom:4px}
    .bh p{color:rgba(255,255,255,.75);font-size:13px}
    .bb{padding:28px 32px 32px;text-align:center}
    .err{
      padding:10px 13px;border-radius:9px;
      background:#fee2e2;border:1px solid #fca5a5;
      color:#991b1b;font-size:13px;margin-bottom:18px;
      display:flex;align-items:center;gap:8px;
    }
    .err.hide{display:none}
    .google-btn{
      width:100%;padding:14px 20px;
      background:#fff;color:#333;
      border:2px solid #e2e8f0;border-radius:12px;
      font-size:15px;font-weight:600;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:12px;
      transition:all .2s;
      text-decoration:none;
    }
    .google-btn:hover{border-color:#4285f4;background:#f8faff;box-shadow:0 4px 12px rgba(66,133,244,.15)}
    .google-btn:active{transform:scale(.98)}
    .google-btn svg{width:20px;height:20px;flex-shrink:0}
    .sep{
      display:flex;align-items:center;gap:12px;
      margin:20px 0;color:#94a3b8;font-size:12px;
    }
    .sep::before,.sep::after{content:'';flex:1;height:1px;background:#e2e8f0}
    .info{
      font-size:12px;color:#64748b;line-height:1.5;
      margin-top:16px;padding:10px;
      background:#f1f5f9;border-radius:8px;
    }
    .bf{padding:14px 32px;border-top:1px solid #e2e8f0;background:#f8fafc;text-align:center}
    .bf p{font-size:11px;color:#64748b}
    .bf strong{color:#1e293b}
  </style>
</head>
<body>
<div class="box">
  <div class="bh">
    <div class="logo">🔄</div>
    <h1>Getfly Sync</h1>
    <p>Đăng nhập bằng tài khoản Google của bạn</p>
  </div>

  <div class="bb">
    <div class="err hide" id="errBox">
      <span>⚠️</span>
      <span id="errMsg"></span>
    </div>

    <a href="/api/auth/google" class="google-btn">
      <svg viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Đăng nhập bằng Google
    </a>

    <div class="info">
      Chỉ nhân viên được phân công (có email trong hệ thống) mới có quyền truy cập.
    </div>
  </div>

  <div class="bf">
    <p>Hệ thống nội bộ — <strong>HAMEC</strong></p>
  </div>
</div>

<script>
  // Hiện lỗi từ URL params (redirect từ callback)
  const params = new URLSearchParams(location.search);
  const error = params.get('error');
  if (error) {
    document.getElementById('errMsg').textContent = error;
    document.getElementById('errBox').classList.remove('hide');
  }
</script>
</body>
</html>
